name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CattleManager.sln

      - name: Build Release
        run: dotnet build CattleManager.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test CattleManager.sln --configuration Release --no-build

      - name: Publish self-contained
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          dotnet publish src/CattleManager.App/CattleManager.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish `
            -p:PublishSingleFile=false `
            -p:Version=$version

      - name: Install WiX v4
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5 --global

      - name: Generate WiX file fragment from publish output
        run: |
          $publishPath = (Resolve-Path ./publish).Path
          $files = Get-ChildItem -Path $publishPath -Recurse -File
          $ns = 'http://wixtoolset.org/schemas/v4/wxs'

          $settings = [System.Xml.XmlWriterSettings]::new()
          $settings.Indent = $true
          $settings.Encoding = [System.Text.Encoding]::UTF8

          $fragmentPath = 'installer/CattleManager.Installer/PublishFiles.wxs'
          $writer = [System.Xml.XmlWriter]::Create($fragmentPath, $settings)

          $writer.WriteStartDocument()
          $writer.WriteStartElement('Wix', $ns)
          $writer.WriteStartElement('Fragment', $ns)
          $writer.WriteStartElement('ComponentGroup', $ns)
          $writer.WriteAttributeString('Id', 'PublishFiles')
          $writer.WriteAttributeString('Directory', 'INSTALLFOLDER')

          $id = 0
          foreach ($file in $files) {
            $compId = "Pub$id"
            $fileId = "PubFile$id"
            $guid   = [System.Guid]::NewGuid().ToString('B').ToUpper()

            $writer.WriteStartElement('Component', $ns)
            $writer.WriteAttributeString('Id', $compId)
            $writer.WriteAttributeString('Guid', $guid)

            $writer.WriteStartElement('File', $ns)
            $writer.WriteAttributeString('Id', $fileId)
            $writer.WriteAttributeString('Source', $file.FullName)
            $writer.WriteAttributeString('KeyPath', 'yes')
            $writer.WriteEndElement() # File

            $writer.WriteEndElement() # Component
            $id++
          }

          $writer.WriteEndElement() # ComponentGroup
          $writer.WriteEndElement() # Fragment
          $writer.WriteEndElement() # Wix
          $writer.WriteEndDocument()
          $writer.Close()

          Write-Host "Generated fragment with $id file components."

      - name: Build MSI
        run: |
          $version  = "${{ github.ref_name }}" -replace '^v', ''
          $publishPath = (Resolve-Path ./publish).Path
          New-Item -ItemType Directory -Force ./dist | Out-Null

          wix build `
            installer/CattleManager.Installer/Package.wxs `
            installer/CattleManager.Installer/PublishFiles.wxs `
            -ext WixToolset.UI.wixext `
            -b installer/CattleManager.Installer `
            -d ProductVersion=$version `
            -d PublishDir=$publishPath `
            -o ./dist/CattleManager-${{ github.ref_name }}.msi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cattle Manager ${{ github.ref_name }}
          body: |
            ## Cattle Manager ${{ github.ref_name }}

            ### Installation
            Download `CattleManager-${{ github.ref_name }}.msi` and run it to install.

            ### What's New
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: ./dist/CattleManager-${{ github.ref_name }}.msi
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
