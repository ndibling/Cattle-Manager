name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CattleManager.sln

      - name: Build
        run: dotnet build CattleManager.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test CattleManager.sln `
            --configuration Release `
            --no-build `
            --settings coverlet.runsettings `
            --logger "trx;LogFileName=test-results.trx" `
            --logger "console;verbosity=normal" `
            --results-directory ./test-results `
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/**

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator `
            -reports:"./test-results/**/coverage.cobertura.xml" `
            -targetdir:"./coverage/report" `
            -reporttypes:"HtmlInline_AzurePipelines;Cobertura" `
            -title:"Cattle Manager Coverage"

      - name: Check coverage threshold
        run: |
          $xml = [xml](Get-Content "./coverage/report/Cobertura.xml")
          $lineCoverage = [double]$xml.coverage.'line-rate' * 100
          Write-Host "Line coverage: $lineCoverage%"
          if ($lineCoverage -lt 80) {
            Write-Error "Coverage $lineCoverage% is below the 80% threshold"
            exit 1
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report

      - name: Publish application
        run: |
          dotnet publish src/CattleManager.App/CattleManager.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output ./publish `
            -p:PublishSingleFile=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cattle-manager-binaries
          path: ./publish
